<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Manage Books</title>
</head>
<body>
    <div class="container">
        <h2>Manage Books</h2>
        
        <form method="POST" style="margin-bottom: 20px;">
            <input type="text" name="book_name" placeholder="Book Title" required>
            <input type="text" name="author" placeholder="Author" required>
            <button type="submit" class="add-btn">Add Book</button>
        </form>

        <hr>

        <table style="width:100%; border-collapse: collapse; margin-top: 20px;">
            <thead>
                <tr style="background-color: #f2f2f2;">
                    <th style="padding: 12px; border-bottom: 2px solid #ddd;">ID</th>
                    <th style="padding: 12px; border-bottom: 2px solid #ddd;">Title</th>
                    <th style="padding: 12px; border-bottom: 2px solid #ddd;">Author</th>
                    <th style="padding: 12px; border-bottom: 2px solid #ddd;">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for b in books %}
                <tr>
                    <td style="padding: 10px; border-bottom: 1px solid #eee;">{{ b.id }}</td>
                    <td style="padding: 10px; border-bottom: 1px solid #eee;">{{ b.name }}</td>
                    <td style="padding: 10px; border-bottom: 1px solid #eee;">{{ b.author }}</td>
                    <td style="padding: 10px; border-bottom: 1px solid #eee;">
                        <a href="{{ url_for('delete_book', book_id=b.id) }}" 
                           style="color: red; text-decoration: none; font-weight: bold;"
                           onclick="return confirm('Are you sure?')">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <br>
        <a href="/" class="back-link">← Back to Dashboard</a>
    </div>
</body>
</html>
